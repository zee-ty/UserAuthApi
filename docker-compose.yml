services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: userauth
      POSTGRES_PASSWORD: userauth
      POSTGRES_DB: userauth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userauth -d userauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  userauthapi:
    build: .
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=userauth;Username=userauth;Password=userauth
      # Override in production: Jwt__Secret=YourProductionSecretAtLeast32CharactersLong
      - Jwt__Issuer=UserAuthApi
      - Jwt__Audience=UserAuthApi
      - Jwt__ExpirationMinutes=60
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
